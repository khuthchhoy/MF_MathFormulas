<p>Semimajor axis: $a$<br>
  Semiminor axis: $b$<br>
  Foci: $F_1(-c,0), F_2(c,0)$<br>
  Distance between the foci: $2c$<br>
  Eccentricity: $e$<br>
  Real numbers: A, B, C,D, E, F, t<br>
  Perimeter: L<br>
  Area: S
</p>

<h2>Equation of an Ellipse (Standard Form)</h2>

<p>$$ \frac{x^2}{a^2} + \frac{y^2}{b^2} = 1$$</p>
