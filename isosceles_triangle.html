<p>
  Base: $a$<br>
  Legs: $b$<br>
  Base angle: $\beta$<br>
  Vertex angle: $\alpha$<br>
  Altitude to the base: $h$<br>
  Perimeter: $L$<br>
  Area: $S$
</p>

<img src="isosceles_triangle.png">

<ol>
  <li>$\beta=90^\circ - \dfrac{\alpha}{2}$</li>

  <li>h^2=b^2 - \dfrac{a^2}{4}$</li>

  <li>$L=a + 2b$</li>

  <li>$S=\dfrac{ah}{2}=\dfrac{b^2}{2}\sin\alpha$</li>
</ol>
