<p>
  Sides of a rectangle: $a,b$<br>
  Diagonal: $d$<br>
  Radius of circumscribed circle: $R$<br>
  Perimeter: $L$<br>
  Area: $S$
</p>

<p>1. $d=\sqrt{a^2+b^2}$</p>

<p>2. $R=\dfrac{d}{2}$</p>

<p>3. $L=2(a+b)$</p>

<p>4. $S=ab$</p>
