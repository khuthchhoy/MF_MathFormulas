<p>
  Side of a square: $a$<br>
  Diagonal: $d$<br>
  Radius of circumscribed circle: $R$<br>
  Radius of inscribed circle: $r$<br>
  Perimeter: $L$<br>
  Area: $S$
</p>

<p>1. $d=a\sqrt{2}$</p>

<p>2. $R=\dfrac{d}{2}=\dfrac{a\sqrt{2}}{2}$</p>

<p>3. $r=\dfrac{a}{2}$</p>

<p>4. $L=4a$</p>

<p>5. $S=a^2$</p>
