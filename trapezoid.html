<p>
  Bases of a trapezoid: $a, b$<br>
  Midline: $q$<br>
  Altitude: $h$<br>
  Area: $S$
</p>

<p>1. Midline of a trapezoid:
  $$q = \dfrac{a+b}{2}$$</p>

<p>2. Area of a trapezoid:
  $$S = \dfrac{a+b}{2} \cdot h = qh$$</p>
