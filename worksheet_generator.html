<style>
    :root {
      --bg-color: #f2f2f7; 
      --card-bg: #ffffff;
      --text-main: #000000;
      --text-muted: #8e8e93;
      --primary-blue: #007aff;
      --border-color: #d1d1d6;
      --ios-green: #34c759;
      --segment-bg: #eeeeef;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #000000;
        --card-bg: #1c1c1e;
        --text-main: #ffffff;
        --text-muted: #8e8e93;
        --border-color: #38383a;
        --segment-bg: #2c2c2e;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding-bottom: 50px;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .sticky-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: rgba(242, 242, 247, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sticky-bar h1 { margin: 0; font-size: 17px; font-weight: 600; }

    .btn-generate {
      background-color: var(--primary-blue);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-generate:active { opacity: 0.7; }

    .app-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    .section-title {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 20px 0 8px 16px;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border-color);
    }

    .row:last-child { border-bottom: none; }

    /* Difficulty Segmented Control Fix */
    .segmented-control {
      display: flex;
      background: var(--segment-bg);
      padding: 2px;
      border-radius: 10px;
      margin: 12px;
      height: 32px;
      align-items: stretch;
    }

    .segment {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.2s, box-shadow 0.2s;
      color: var(--text-main);
    }

    .segment.active {
      background: var(--card-bg);
      box-shadow: 0 3px 8px rgba(0,0,0,0.12);
    }

    /* Inputs & Select */
    input[type="text"], select {
      font-size: 17px;
      padding: 6px 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: inherit;
      outline: none;
    }

    input[type="text"] { width: 70px; text-align: right; }
    select { min-width: 155px; text-align: right; direction: rtl; }

    /* Toggle Switch Pixel-Perfect Fix */
    .switch {
      position: relative;
      display: inline-block;
      width: 51px;
      height: 31px;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #e9e9eb;
      transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 31px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 27px;
      width: 27px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
      box-shadow: 0 3px 8px rgba(0,0,0,0.15);
    }

    input:checked + .slider { background-color: var(--ios-green); }
    /* 51px total - 27px knob - 2px start = 22px final. Correcting for centering. */
    input:checked + .slider:before { transform: translateX(20px); }

    .btn-secondary {
      background-color: var(--card-bg);
      color: var(--primary-blue);
      border: none;
      padding: 16px;
      font-size: 17px;
      width: 100%;
      text-align: center;
      border-top: 0.5px solid var(--border-color);
      cursor: pointer;
    }

    /* Worksheet View */
    #TBL {
      margin-top: 10px;
      background: white;
      padding: 30px 20px;
      border-radius: 12px;
      color: black;
      min-height: 200px;
    }

    table { width: 100%; border-collapse: collapse; }
    td { padding: 25px 10px; }

    .math-problem {
      display: inline-block;
      text-align: right;
      font-family: "Courier New", Courier, monospace;
      font-size: 26px;
      line-height: 1.2;
    }

    .bottom-line { border-bottom: 2px solid black; margin-bottom: 4px; padding-bottom: 2px; }
    .answer { color: var(--ios-green); font-weight: 700; height: 30px; }

    @media print {
      .sticky-bar, .app-container > :not(#TBL) { display: none !important; }
      body { background: white; }
      #TBL { padding: 0; margin: 0; }
    }
  </style>
  <div class="sticky-bar">
    <h1>Math Master</h1>
    <button class="btn-generate" onclick="fullRefresh()">Generate</button>
  </div>

  <div class="app-container">
    
    <h2 class="section-title">Difficulty</h2>
    <div class="card">
      <div class="segmented-control">
        <div id="seg-easy" class="segment" onclick="setDifficulty('easy')">Easy</div>
        <div id="seg-med" class="segment active" onclick="setDifficulty('med')">Medium</div>
        <div id="seg-hard" class="segment" onclick="setDifficulty('hard')">Hard</div>
      </div>
    </div>

    <h2 class="section-title">Settings</h2>
    <div class="card">
      <div class="row">
        <label>Type</label>
        <select id="MathAction" onchange="updateState()">
          <option value="add">Addition</option>
          <option value="sub">Subtraction</option>
          <option value="mul">Multiplication</option>
          <option value="div">Division</option>
          <option value="mixed">Mixed</option>
        </select>
      </div>
      <div class="row">
        <label>Problems</label>
        <input type="text" id="NumProb" inputmode="numeric" onchange="updateState()">
      </div>
      <div class="row">
        <label>Columns</label>
        <input type="text" id="ColPage" inputmode="numeric" onchange="updateState()">
      </div>
      <div class="row">
        <label>Min Value</label>
        <input type="text" id="MinVal" inputmode="numeric" onchange="updateState()">
      </div>
      <div class="row">
        <label>Max Value</label>
        <input type="text" id="MaxVal" inputmode="numeric" onchange="updateState()">
      </div>
      <div class="row">
        <label>Top > Bottom</label>
        <label class="switch">
          <input type="checkbox" id="ReMax" onchange="updateState()">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <label>Show Answers</label>
        <label class="switch">
          <input type="checkbox" id="answers" onchange="renderWorksheet(); triggerHaptic();">
          <span class="slider"></span>
        </label>
      </div>
      <button class="btn-secondary" onclick="scrambleCurrent()">Scramble Order</button>
    </div>

    <h2 class="section-title">Worksheet Preview</h2>
    <div id="TBL"></div>
  </div>

<script>
  let config = {
    numProb: 12,
    cols: 3,
    min: 10,
    max: 99,
    topBigger: true,
    action: 'add',
    data: [] 
  };

  function save() {
    const toSave = {...config};
    delete toSave.data; 
    localStorage.setItem('mathAppConfig', JSON.stringify(toSave));
  }

  function load() {
    const saved = localStorage.getItem('mathAppConfig');
    if (saved) {
      Object.assign(config, JSON.parse(saved));
      document.getElementById("NumProb").value = config.numProb;
      document.getElementById("ColPage").value = config.cols;
      document.getElementById("MinVal").value = config.min;
      document.getElementById("MaxVal").value = config.max;
      document.getElementById("ReMax").checked = config.topBigger;
      document.getElementById("MathAction").value = config.action;
    }
    updateDifficultyUI();
  }

  function triggerHaptic() {
    if (navigator.vibrate) navigator.vibrate(15);
  }

  function updateDifficultyUI() {
    document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
    if (config.min == 0 && config.max == 10) document.getElementById('seg-easy').classList.add('active');
    else if (config.min == 10 && config.max == 99) document.getElementById('seg-med').classList.add('active');
    else if (config.min == 100 && config.max == 999) document.getElementById('seg-hard').classList.add('active');
  }

  function updateState() {
    config.numProb = parseInt(document.getElementById("NumProb").value) || 12;
    config.cols = parseInt(document.getElementById("ColPage").value) || 3;
    config.min = parseInt(document.getElementById("MinVal").value) || 0;
    config.max = parseInt(document.getElementById("MaxVal").value) || 10;
    config.topBigger = document.getElementById("ReMax").checked;
    config.action = document.getElementById("MathAction").value;
    updateDifficultyUI();
    save();
    generateNewData();
  }

  function setDifficulty(level) {
    if (level === 'easy') { config.min = 0; config.max = 10; }
    if (level === 'med')  { config.min = 10; config.max = 99; }
    if (level === 'hard') { config.min = 100; config.max = 999; }
    document.getElementById("MinVal").value = config.min;
    document.getElementById("MaxVal").value = config.max;
    updateState();
  }

  function generateNewData() {
    config.data = [];
    const ops = ['add', 'sub', 'mul', 'div'];

    for (let i = 0; i < config.numProb; i++) {
      let activeOp = config.action === 'mixed' ? ops[Math.floor(Math.random() * 4)] : config.action;
      let x, y, ans;

      if (activeOp === 'div') {
        y = Math.floor(Math.random() * (config.max > 20 ? 11 : 5)) + 2; 
        ans = Math.floor(Math.random() * (config.max > 50 ? 12 : 6)) + 1;
        x = y * ans;
      } else {
        x = Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;
        y = config.topBigger 
            ? Math.floor(Math.random() * (x - config.min + 1)) + config.min 
            : Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;
        
        if (activeOp === 'add') ans = x + y;
        if (activeOp === 'sub') ans = x - y;
        if (activeOp === 'mul') ans = x * y;
      }
      config.data.push({ x, y, op: activeOp, ans });
    }
    renderWorksheet();
  }

  function renderWorksheet() {
    const showAns = document.getElementById('answers').checked;
    const symbols = { add: '+', sub: '-', mul: '×', div: '÷' };
    let html = '<table><tr>';

    config.data.forEach((item, index) => {
      html += `
        <td align="center">
          <div class="math-problem">
            <div>${item.x}</div>
            <div class="bottom-line">${symbols[item.op]} ${item.y}</div>
            <div class="answer">${showAns ? item.ans : '&nbsp;'}</div>
          </div>
        </td>`;
      if ((index + 1) % config.cols === 0 && (index + 1) < config.data.length) {
        html += '</tr><tr>';
      }
    });

    html += '</tr></table>';
    document.getElementById('TBL').innerHTML = html;
  }

  function fullRefresh() {
    triggerHaptic();
    generateNewData();
    document.getElementById('TBL').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function scrambleCurrent() {
    triggerHaptic();
    config.data.sort(() => Math.random() - 0.5);
    renderWorksheet();
  }

  window.onload = () => {
    load();
    generateNewData();
  };
</script>
