
<div class="sticky-bar">
    <button class="btn-settings" onclick="App.toggleSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06-.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06-.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        Configure
    </button>
    <div class="action-stack">
        <button class="btn-generate" onclick="App.generateNewData()">Generate</button>
    </div>
</div>

<div class="app-container">
    <div id="settings-panel" class="hidden">
        
        <h2 class="section-title">Include Subjects</h2>
        <div class="card" id="subject-list">
        </div>
        
        <h2 class="section-title">Difficulty Level</h2>
        <div class="card">
            <div class="segmented-control">
                <div id="seg-easy" class="segment active" data-diff="easy" onclick="App.setDifficulty('easy')">Easy</div>
                <div id="seg-med" class="segment" data-diff="med" onclick="App.setDifficulty('med')">Medium</div>
                <div id="seg-hard" class="segment" data-diff="hard" onclick="App.setDifficulty('hard')">Hard</div>
            </div>
        </div>
        
        <h2 class="section-title">Worksheet Settings</h2>
        <div class="card">
            <div class="row">
                <label>Problems</label>
                <input type="number" id="num-problems" value="10" min="1" max="100" onchange="App.generateNewData()">
            </div>
            <div class="row">
                <label>Columns</label>
                <input type="number" id="num-columns" value="1" min="1" max="4" onchange="App.updateColumns()">
            </div>
        </div>
        
        <div class="card">
            <div class="row">
                <label>Show Answers</label>
                <label class="switch">
                    <input type="checkbox" id="show-answers" onchange="App.renderWorksheet()">
                        <span class="slider"></span>
                </label>
            </div>
            <div class="row">
                <label>Show Detail Solutions</label>
                <label class="switch">
                    <input type="checkbox" id="show-solutions" onchange="App.renderWorksheet()">
                        <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>
    
    <h2 class="section-title">Worksheet Preview</h2>
    <div id="worksheet-grid"></div>
</div>

<script>
    // Safe fallback for triggerHaptic if missing from environment
    window.triggerHaptic = window.triggerHaptic || function() {};
    
    // ==========================================
    // 1. UTILITY FUNCTIONS
    // ==========================================
    const Utils = {
        getRnd: (min, max) => Math.floor(Math.random() * (max - min + 1)) + min,
        shuffle: (array) => {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        },
        generateNiceParams: () => {
            let a, k1, k2, m, n, p, q, val_den;
            do {
                a = Utils.getRnd(-5, 5);
                k1 = Utils.getRnd(1, 3);
                k2 = Utils.getRnd(1, 3);
                m = Utils.getRnd(-5, 5);
                n = Utils.getRnd(-5, 5);
                p = Utils.getRnd(-5, 5);
                q = Utils.getRnd(-5, 5);
                val_den = k2 * (n * a + q);
            } while (a === 0 || m === 0 || n === 0 || val_den === 0 || Math.abs(m) === Math.abs(n));
            return { a, k1, k2, m, n, p, q };
        },
        
        // New Helper: Formats ax^2 + bx + c nicely
        poly2: (a, b, c) => {
            let res = "";
            // Handle ax^2
            if (a === 1) res += "x^2";
            else if (a === -1) res += "-x^2";
            else res += `${a}x^2`;
            
            // Handle bx
            if (b > 0) res += ` + ${b === 1 ? "" : b}x`;
            else if (b < 0) res += ` - ${Math.abs(b) === 1 ? "" : Math.abs(b)}x`;
            
            // Handle c
            if (c > 0) res += ` + ${c}`;
            else if (c < 0) res += ` - ${Math.abs(c)}`;
            
            return res;
        },
        
        minusA: (a) => a > 0 ? `(x - ${a})` : a < 0 ? `(x + ${Math.abs(a)})` : `(x)`,
        
        linear: (a, b) => {
            let res = '';
            if (a === 1) res += 'x'; else if (a === -1) res += '-x'; else res += `${a}x`;
            if (b > 0) res += ` + ${b}`; if (b < 0) res += ` - ${Math.abs(b)}`;
            return res;
        },
        gcd: function(x, y) {
            x = Math.abs(x); y = Math.abs(y);
            return y === 0 ? x : this.gcd(y, x % y);
        },
        formatSolution: (solStr) => {
            if (!solStr || solStr.includes('\\begin{aligned}')) return solStr;
            if (solStr.includes('=')) return `\\begin{aligned} ${solStr} \\end{aligned}`;
            return solStr;
        }
    };
    
    // ==========================================
    // 2. PROBLEM REGISTRY
    // ==========================================
    const ProblemRegistry = {
        arithmetic: {
            easy: [
                   (a, b) => ({
                       expr: `${a} ${b > 0 ? '+' : '-'} ${Math.abs(b)}`,
                       ans: `= ${a + b}`,
                       sol: `\\text{Combine terms: } ${a} ${b > 0 ? '+' : '-'} ${Math.abs(b)} = ${a + b}`
                   })
                   ],
                   med: [
                         (a, b) => ({
                             expr: `${a} \\times ${b}`,
                             ans: `= ${a * b}`,
                             sol: `\\text{Multiply: } ${a} \\times ${b} = ${a * b}`
                         })
                         ],
                         hard: [
                                (a, b, c, d) => {
                                    let num = Math.abs(a) * d + c * b;
                                    return {
                                        expr: `\\frac{${Math.abs(a)}}{${b}} + \\frac{${c}}{${d}}`,
                                        ans: `= \\frac{${num}}{${b * d}}`,
                                        sol: `\\begin{aligned} &\\text{Common denom: } ${b} \\times ${d} = ${b*d} \\\\ &= \\frac{${Math.abs(a)*d}}{${b*d}} + \\frac{${c*b}}{${b*d}} = \\frac{${num}}{${b*d}} \\end{aligned}`
                                    };
                                },
                                (a, b, c, d) => ({
                                    expr: `${c} \\times (${d} + 1)^2 - ${Math.abs(a)}`,
                                    ans: `= ${c * Math.pow(d + 1, 2) - Math.abs(a)}`,
                                    sol: `\\begin{aligned} &= ${c} \\times (${d+1})^2 - ${Math.abs(a)} = ${c * Math.pow(d + 1, 2) - Math.abs(a)} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{${a * b} + ${c * d}}{${b}}`,
                                    ans: `= \\frac{${(a * b) + (c * d)}}{${b}}`,
                                    sol: `\\begin{aligned} &= \\frac{${a*b} + ${c*d}}{${b}} = \\frac{${a*b + c*d}}{${b}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `(${a} + ${b}) \\div ${c} \\times ${d}`,
                                    ans: `= ${Math.floor(((a + b) / c) * d)}`,
                                    sol: `\\begin{aligned} &= (${a+b}) \\div ${c} \\times ${d} \\approx ${Math.floor(((a + b) / c) * d)} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\sqrt{${b}^2 + ${c}^2} \\times ${a}`,
                                    ans: `\\approx ${Math.round(a * Math.sqrt(b*b + c*c))}`,
                                    sol: `\\begin{aligned} &= \\sqrt{${b*b} + ${c*c}} \\times ${a} \\approx ${Math.round(a * Math.sqrt(b*b + c*c))} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `${a}\\% \\text{ of } ${b} + ${c}`,
                                    ans: `= ${Math.round((a/100)*b) + c}`,
                                    sol: `\\begin{aligned} &= 0.${Math.abs(a)} \\times ${b} + ${c} = ${Math.round((a/100)*b) + c} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\left| ${a} - ${b} \\right| \\times ${c}`,
                                    ans: `= ${Math.abs(a - b) * c}`,
                                    sol: `\\begin{aligned} &= |${a-b}| \\times ${c} = ${Math.abs(a - b) * c} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{${a}}{${b}} \\div \\frac{${c}}{${d}}`,
                                    ans: `= \\frac{${a * d}}{${b * c}}`,
                                    sol: `\\begin{aligned} &\\text{Multiply by reciprocal: } \\frac{${a}}{${b}} \\times \\frac{${d}}{${c}} = \\frac{${a*d}}{${b*c}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `(${a} \\times ${b}) + (${c} \\div ${d})`,
                                    ans: `= ${a*b + Math.floor(c/d)}`,
                                    sol: `\\begin{aligned} &= (${a*b}) + (${(c/d).toFixed(2)}) \\approx ${a*b + Math.floor(c/d)} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\sqrt[${d}]{${b}^{${c}}} \\times ${a}`,
                                    ans: `= ${Math.round(a * Math.pow(b, c/d))}`,
                                    sol: `\\begin{aligned} &= ${b}^{${c}/${d}} \\times ${a} \\approx ${Math.round(a * Math.pow(b, c/d))} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{${a} + ${b} + ${c}}{${d}}`,
                                    ans: `= \\frac{${a+b+c}}{${d}}`,
                                    sol: `\\begin{aligned} &= \\frac{${a+b+c}}{${d}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `0.\\overline{${Math.abs(a)}} \\times ${b}`,
                                    ans: `= ${Math.round((Math.abs(a)/9)*b)}`,
                                    sol: `\\begin{aligned} &= \\frac{${Math.abs(a)}}{9} \\times ${b} \\approx ${Math.round((Math.abs(a)/9)*b)} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{1}{${a}} + \\frac{1}{${b}} + \\frac{1}{${c}}`,
                                    ans: `= \\frac{${b*c + a*c + a*b}}{${a*b*c}}`,
                                    sol: `\\begin{aligned} &\\text{Find LCD } (${a*b*c}) \\implies \\frac{${b*c + a*c + a*b}}{${a*b*c}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `(${a}^{${b}})^{${c}} \\div ${d}`,
                                    ans: `= ${(Math.pow(a, b*c) / d).toFixed(2)}`,
                                    sol: `\\begin{aligned} &= ${a}^{${b*c}} \\div ${d} \\approx ${(Math.pow(a, b*c) / d).toFixed(2)} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\log_{10}(${b}) \\times ${a}`,
                                    ans: `\\approx ${Math.round(a * Math.log10(b))}`,
                                    sol: `\\begin{aligned} &\\approx ${Math.log10(b).toFixed(2)} \\times ${a} \\approx ${Math.round(a * Math.log10(b))} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{\\frac{${Math.abs(a)}}{${b}}}{\\frac{${c}}{${d}}}`,
                                    ans: `= \\frac{${Math.abs(a)*d}}{${b*c}}`,
                                    sol: `\\begin{aligned} &= \\frac{${Math.abs(a)}}{${b}} \\times \\frac{${d}}{${c}} = \\frac{${Math.abs(a)*d}}{${b*c}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `(${Math.abs(a)} \\times 10^{${c}}) \\times (${b} \\times 10^{${d}})`,
                                    ans: `= ${Math.abs(a)*b} \\times 10^{${c+d}}`,
                                    sol: `\\begin{aligned} &= (${Math.abs(a)} \\times ${b}) \\times 10^{${c}+${d}} = ${Math.abs(a)*b} \\times 10^{${c+d}} \\end{aligned}`
                                }),
                                (a, b, c, d) => {
                                    let factA = Math.abs(a) + 3;
                                    return {
                                        expr: `\\frac{${factA}!}{(${factA}-2)!}`,
                                        ans: `= ${factA * (factA-1)}`,
                                        sol: `\\begin{aligned} &= \\frac{${factA} \\times ${factA-1} \\times (${factA}-2)!}{(${factA}-2)!} = ${factA * (factA-1)} \\end{aligned}`
                                    };
                                },
                                (a, b, c, d) => ({
                                    expr: `\\log_{${b}}(${b}^{${c}}) + \\ln(e^{${d}})`,
                                    ans: `= ${c + d}`,
                                    sol: `\\begin{aligned} &= ${c}\\log_{${b}}(${b}) + ${d}\\ln(e) = ${c}(1) + ${d}(1) = ${c + d} \\end{aligned}`
                                })
                                ]
        },
        algebra: {
            easy: [
                   (a, b, c) => {
                       let rhs = a * c + b;
                       return {
                           expr: `${a}x ${b > 0 ? '+' : '-'} ${Math.abs(b)} = ${rhs}`,
                           ans: `x = ${c}`,
                           sol: `\\begin{aligned} ${a}x &= ${rhs} ${b>0?'-':'+'} ${Math.abs(b)} \\\\ x &= ${c} \\end{aligned}`
                       };
                   }
                   ],
                   med: [
                         (a, b) => {
                             let mid = a + b, last = a * b;
                             let ansStr = `= x^2 ${mid===0?"":(mid>0?`+ ${mid}x`:`- ${Math.abs(mid)}x`)} ${last>0?`+ ${last}`:`- ${Math.abs(last)}`}`;
                             return {
                                 expr: `(x ${a > 0 ? '+' : '-'} ${Math.abs(a)})(x ${b > 0 ? '+' : '-'} ${Math.abs(b)})`,
                                 ans: ansStr,
                                 sol: `\\begin{aligned} &\\text{FOIL Method: } \\\\ &${ansStr} \\end{aligned}`
                             };
                         }
                         ],
                         hard: [
                                (a, b, c, d) => {
                                    let base = Utils.getRnd(2, 4), val = Utils.getRnd(1, 3);
                                    return {
                                        expr: `\\log_{${base}}(x - ${c}) = ${val}`,
                                        ans: `x = ${Math.pow(base, val) + c}`,
                                        sol: `\\begin{aligned} x - ${c} &= ${base}^{${val}} \\implies x = ${Math.pow(base, val) + c} \\end{aligned}`
                                    };
                                },
                                (a, b, c, d) => {
                                    let base = Utils.getRnd(2, 4), val = Utils.getRnd(2, 4);
                                    return {
                                        expr: `${base}^{x + ${c}} = ${Math.pow(base, val)}`,
                                        ans: `x = ${val - c}`,
                                        sol: `\\begin{aligned} ${base}^{x+${c}} &= ${base}^{${val}} \\implies x + ${c} = ${val} \\implies x = ${val-c} \\end{aligned}`
                                    };
                                },
                                (a, b, c, d) => {
                                    let B = -(c + d), C = c * d;
                                    return {
                                        expr: `x^2 ${B>0?`+${B}`:B}x ${C>0?`+${C}`:C} = 0`,
                                        ans: `x = ${c}, ${d}`,
                                        sol: `\\begin{aligned} &(x - ${c})(x - ${d}) = 0 \\implies x = ${c}, \\; x = ${d} \\end{aligned}`
                                    };
                                },
                                () => ({
                                    expr: `2x^2 - 5x + 3 = 0`,
                                    ans: `x = 1, \\frac{3}{2}`,
                                    sol: `\\begin{aligned} &(2x - 3)(x - 1) = 0 \\implies x=\\frac{3}{2}, \\; x=1 \\end{aligned}`
                                }),
                                (a, b, c, d) => {
                                    let base = Utils.getRnd(2, 3);
                                    return {
                                        expr: `\\log_{${base}}(x) + \\log_{${base}}(${b}) = ${c}`,
                                        ans: `x = ${Math.pow(base, c) / b}`,
                                        sol: `\\begin{aligned} \\log_{${base}}(${b}x) &= ${c} \\implies ${b}x = ${base}^{${c}} \\implies x = ${Math.pow(base, c) / b} \\end{aligned}`
                                    };
                                },
                                (a, b, c, d) => ({
                                    expr: `(x + ${a})^2 = ${Math.abs(b)}`,
                                    ans: `x = -${a} \\pm \\sqrt{${Math.abs(b)}}`,
                                    sol: `\\begin{aligned} x + ${a} &= \\pm \\sqrt{${Math.abs(b)}} \\implies x = -${a} \\pm \\sqrt{${Math.abs(b)}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{x}{${a}} - ${b} = ${c}`,
                                    ans: `x = ${a * (b + c)}`,
                                    sol: `\\begin{aligned} \\frac{x}{${a}} &= ${c+b} \\implies x = ${a*(b+c)} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `x^3 - ${c}x^2 + ${d}x - 6 = 0 \\; (x=2)`,
                                    ans: `\\text{Evaluate } P(2)`,
                                    sol: `\\begin{aligned} P(2) &= 2^3 - ${c}(2)^2 + ${d}(2) - 6 \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `|2x - ${a}| = ${b}`,
                                    ans: `x = \\frac{${a+b}}{2}, \\frac{${a-b}}{2}`,
                                    sol: `\\begin{aligned} 2x - ${a} &= \\pm ${b} \\implies x = \\frac{${a} \\pm ${b}}{2} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{x+${c}}{x-${d}} = ${a}`,
                                    ans: `x = \\frac{${a*d + c}}{a-1}`,
                                    sol: `\\begin{aligned} x+${c} &= ${a}(x-${d}) \\implies x = \\frac{${a*d+c}}{${a-1}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `x^2 + ${b}x + ${c} = 0`,
                                    ans: `x = \\frac{-${b} \\pm \\sqrt{${b*b - 4*c}}}{2}`,
                                    sol: `\\begin{aligned} x &= \\frac{-${b} \\pm \\sqrt{${b}^2 - 4(1)(${c})}}{2(1)} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `x + y = ${a}, \\; 2x - y = ${b}`,
                                    ans: `x = \\frac{${a+b}}{3}`,
                                    sol: `\\begin{aligned} &\\text{Add equations: } 3x = ${a+b} \\implies x = \\frac{${a+b}}{3} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `x^2 - ${c+d}x + ${c*d} > 0`,
                                    ans: `x < ${Math.min(c,d)} \\text{ or } x > ${Math.max(c,d)}`,
                                    sol: `\\begin{aligned} &(x - ${c})(x - ${d}) > 0 \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{x^2 - ${c*c}}{x-${c}} = x + k`,
                                    ans: `k = ${c}`,
                                    sol: `\\begin{aligned} &\\frac{(x-${c})(x+${c})}{x-${c}} = x+${c} \\implies k=${c} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `x^2 + ${b*2}x = ${c}`,
                                    ans: `(x + ${b})^2 = ${c + b*b}`,
                                    sol: `\\begin{aligned} &x^2 + ${b*2}x + (${b})^2 = ${c} + (${b})^2 \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `\\frac{${a}}{x} + \\frac{${b}}{x} = ${c}`,
                                    ans: `x = \\frac{${a+b}}{${c}}`,
                                    sol: `\\begin{aligned} \\frac{${a+b}}{x} &= ${c} \\implies x = \\frac{${a+b}}{${c}} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `2^{x} = 4^{x - ${c}}`,
                                    ans: `x = ${2*c}`,
                                    sol: `\\begin{aligned} 2^x &= 2^{2(x-${c})} \\implies x = 2x - ${2*c} \\implies x = ${2*c} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `f(x) = ${Math.abs(a)}x+${b}, g(x) = x^2, \\; f(g(${c}))`,
                                    ans: `= ${Math.abs(a) * c * c + b}`,
                                    sol: `\\begin{aligned} g(${c}) &= ${c*c} \\implies f(${c*c}) = ${Math.abs(a) * c * c + b} \\end{aligned}`
                                }),
                                (a, b, c, d) => ({
                                    expr: `|x - ${c}| < ${d}`,
                                    ans: `${c-d} < x < ${c+d}`,
                                    sol: `\\begin{aligned} -${d} &< x - ${c} < ${d} \\implies ${c-d} < x < ${c+d} \\end{aligned}`
                                })
                                ]
        },
        trigonometry: {
            easy: [
                   () => {
                       // Use an array of objects to keep angles and values paired and easy to read
                       const values = [
                                       { angle: '0', val: '0' },
                                       { angle: '\\frac{\\pi}{2}', val: '1' },
                                       { angle: '\\pi', val: '0' },
                                       { angle: '\\frac{3\\pi}{2}', val: '-1' },
                                       { angle: '2\\pi', val: '0' }
                                       ];
                                       
                                       // Use Utils.getRnd to match your helper object
                                       const r = Utils.getRnd(0, values.length - 1);
                                       const choice = values[r];
                                       
                                       return {
                                           // Added a space after \sin for better LaTeX rendering
                                           expr: `\\sin\\left(${choice.angle}\\right)`,
                                           ans: `= ${choice.val}`,
                                           sol: `\\text{From the unit circle, the y-coordinate at } ${choice.angle} \\text{ is } ${choice.val}.`
                                       };
                   }
                   ],
                   med: [
                         (a) => ({
                             expr: `\\sin^2(${Math.abs(a)}x) + \\cos^2(${Math.abs(a)}x)`,
                             ans: `= 1`,
                             sol: `\\text{Pythagorean Identity: } \\sin^2(\\theta) + \\cos^2(\\theta) = 1 \\text{ for any } \\theta`
                         })
                         ],
                         hard: [
                                (a, b) => ({
                                    expr: `\\cos^2(${b}x) - \\sin^2(${b}x)`,
                                    ans: `= \\cos(${2 * b}x)`,

                           ans: `= ${sum}`,
                           sol: `\\text{Evaluate brackets: } \\frac{${n}}{2}[${2*a} + ${b*(n-1)}] = ${sum}`
                       };
                   }
                   ],
                   med: [
                         (a, b, c) => {
                             let r = b > 0 ? b : 2, n = c + 3;
                             let sum = Math.abs(a) * (Math.pow(r, n) - 1) / (r - 1);
                             return {
                                 expr: `S_{${n}} = ${Math.abs(a)} \\frac{${r}^{${n}} - 1}{${r} - 1}`,
                                 ans: `= ${Math.round(sum)}`,
                                 sol: `\\text{Geometric Sum formula evaluation.}`
                             };
                         }
                         ],
                         hard: [
                                (a, b, c) => {
                                    let n = c + 6, sum = n * (2 * a + (n - 1) * b) / 2;
                                    return {
                                        expr: `\\sum_{k=1}^{${n}} (${a} + (k-1)\\cdot${b})`,
                                        ans: `= ${sum}`,
                                        sol: `\\text{Arithmetic series: } S_n = \\frac{n}{2}(2a_1 + (n-1)d)`
                                    };
                                },
                                (a, b, c, d) => {
                                    let n = d + 4, sum = a * (Math.pow(2, n) - 1);
                                    return {
                                        expr: `\\sum_{k=0}^{${n-1}} ${a} \\cdot 2^k`,
                                        ans: `= ${sum}`,
                                        sol: `\\text{Geometric series: } S_n = a\\frac{r^n-1}{r-1}`
                                    };
                                },
                                () => ({
                                    expr: `\\sum_{k=0}^{\\infty} (0.5)^k`,
                                    ans: `= 2`,
                                    sol: `\\text{Infinite Geometric: } S = \\frac{a}{1-r} = \\frac{1}{1-0.5} = 2`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{10} k`,
                                    ans: `= 55`,
                                    sol: `\\text{Sum of first } n \\text{ integers: } \\frac{n(n+1)}{2} = \\frac{10(11)}{2} = 55`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{\\infty} 10 \\cdot (0.5)^{k-1}`,
                                    ans: `= 20`,
                                    sol: `S = \\frac{a}{1-r} = \\frac{10}{1 - 0.5} = 20`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{n} (3k - 1)`,
                                    ans: `= \\frac{3n(n+1)}{2} - n`,
                                    sol: `3\\sum k - \\sum 1 = 3\\frac{n(n+1)}{2} - n`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{6} 2^k`,
                                    ans: `= 126`,
                                    sol: `2+4+8+16+32+64 = 126`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{\\infty} \\frac{1}{2^k}`,
                                    ans: `= 1`,
                                    sol: `S = \\frac{1/2}{1 - 1/2} = 1`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{n} k^2`,
                                    ans: `= \\frac{n(n+1)(2n+1)}{6}`,
                                    sol: `\\text{Standard formula for sum of consecutive squares.}`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{8} (2k - 1)`,
                                    ans: `= 64`,
                                    sol: `\\text{Sum of first } n \\text{ odd integers is } n^2 \\implies 8^2 = 64`
                                }),
                                () => ({
                                    expr: `\\sum_{k=0}^{\\infty} (1/3)^k`,
                                    ans: `= 1.5`,
                                    sol: `S = \\frac{1}{1 - 1/3} = \\frac{1}{2/3} = 1.5`
                                }),
                                (a, b) => ({
                                    expr: `\\sum_{k=1}^{n} (k + ${b})`,
                                    ans: `= \\frac{n(n+1)}{2} + ${b}n`,
                                    sol: `\\sum k + \\sum ${b} = \\frac{n(n+1)}{2} + ${b}n`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{10} \\frac{1}{k(k+1)}`,
                                    ans: `= \\frac{10}{11}`,
                                    sol: `\\text{Telescoping sum: } (1 - 1/2) + (1/2 - 1/3) \\dots = 1 - 1/11`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{\\infty} \\frac{1}{k^2}`,
                                    ans: `= \\frac{\\pi^2}{6}`,
                                    sol: `\\text{Basel Problem: famous known convergence to } \\pi^2/6`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{n} \\left( \\frac{1}{k} - \\frac{1}{k+1} \\right)`,
                                    ans: `= 1 - \\frac{1}{n+1}`,
                                    sol: `\\text{Telescoping series: all middle terms cancel out.}`
                                }),
                                () => ({
                                    expr: `\\sum_{k=1}^{\\infty} \\frac{1}{k(k+2)}`,
                                    ans: `= \\frac{3}{4}`,
                                    sol: `\\text{Partial fractions } \\frac{1}{2}(\\frac{1}{k} - \\frac{1}{k+2}). \\text{ Telescoping leaves } 1/2(1 + 1/2)`
                                }),
                                () => ({
                                    expr: `\\lim_{n \\to \\infty} \\left| \\frac{a_{n+1}}{a_n} \\right| < 1 \\text{ means?}`,
                                    ans: `\\text{Absolute convergence}`,
                                    sol: `\\text{This is the formal definition of the Ratio Test.}`
                                }),
                                (a, b, c) => ({
                                    expr: `\\text{Maclaurin for } e^x \\text{ at } x=\\ln(${c})`,
                                    ans: `= ${c}`,
                                    sol: `e^{\\ln(${c})} = ${c}`
                                }),
                                () => ({
                                    expr: `\\sum_{n=1}^{\\infty} \\frac{(-1)^{n-1}}{n}`,
                                    ans: `= \\ln(2)`,
                                    sol: `\\text{This is the alternating harmonic series, evaluating Maclaurin } \\ln(1+x) \\text{ at } x=1`
                                })
                                ]
        }
    };
    
    // ==========================================
    // 3. ENGINE (DATA GENERATOR)
    // ==========================================
    class WorksheetEngine {
        constructor(registry) {
            this.registry = registry;
            this.currentData = [];
        }
        
        // Now accepts an Array of subjects
        generateProblems(subjects, difficulty, numProblems) {
            const problems = [];
            const seenExprs = new Set();
            
            // 1. Variety Logic: Try to pick at least one from each selected subject first
            if (subjects.length > 1) {
                for (const topic of subjects) {
                    if (problems.length >= numProblems) break;
                    
                    const generators = this.registry[topic][difficulty];
                    if (!generators) continue;
                    
                    let foundForTopic = false;
                    const shuffledGens = Utils.shuffle([...generators]);
                    
                    for (const generator of shuffledGens) {
                        let attempts = 0;
                        while (attempts < 30) {
                            const a = Utils.getRnd(2, 9), b = Utils.getRnd(2, 9), c = Utils.getRnd(1, 5), d = Utils.getRnd(2, 5);
                            const result = generator(a, b, c, d);
                            
                            if (!seenExprs.has(result.expr)) {
                                seenExprs.add(result.expr);
                                result.sol = Utils.formatSolution(result.sol);
                                problems.push(result);
                                foundForTopic = true;
                                break;
                            }
                            attempts++;
                        }
                        if (foundForTopic) break;
                    }
                }
            }
            
            // 2. Fill Remaining Slots: Pool remaining selected subjects
            let availableGenerators = [];
            subjects.forEach(topic => {
                if (this.registry[topic] && this.registry[topic][difficulty]) {
                    availableGenerators.push(...this.registry[topic][difficulty]);
                }
            });
            
            const remainingNeeded = numProblems - problems.length;
            for (let i = 0; i < remainingNeeded; i++) {
                let foundUnique = false;
                const shuffledGenerators = Utils.shuffle([...availableGenerators]);
                
                for (const generator of shuffledGenerators) {
                    let attempts = 0;
                    while (attempts < 30) {
                        const a = Utils.getRnd(2, 9), b = Utils.getRnd(2, 9), c = Utils.getRnd(1, 5), d = Utils.getRnd(2, 5);
                        const result = generator(a, b, c, d);
                        
                        if (!seenExprs.has(result.expr)) {
                            seenExprs.add(result.expr);
                            result.sol = Utils.formatSolution(result.sol);
                            problems.push(result);
                            foundUnique = true;
                            break;
                        }
                        attempts++;
                    }
                    if (foundUnique) break;
                }
            }
            
            this.currentData = problems;
            return problems;
        }
    }
    
    // =========================================
    // 4. Save setting and loadSetting
    // =========================================
    function saveSettingsForCalculus() {
        const settings = {
            subjects: App.getSelectedSubjects(), // Saving as an array
            difficulty: document.querySelector('.segment.active').dataset.diff,
            numProblems: document.getElementById('num-problems').value,
            columns: document.getElementById('num-columns').value,
            showAnswers: document.getElementById('show-answers').checked,
            showSolutions: document.getElementById('show-solutions').checked
        };
        localStorage.setItem('worksheetSettingsForCalculus', JSON.stringify(settings));
        if (window.webkit && window.webkit.messageHandlers.saveSettingsForCalculus) {
            window.webkit.messageHandlers.saveSettingsForCalculus.postMessage(JSON.stringify(settings));
        }
    }
    
    function loadSettings(jsonString) {
        const saved = jsonString || localStorage.getItem('worksheetSettingsForCalculus');
        if (saved) {
            const s = JSON.parse(saved);
            
            // Handle array of subjects
            if (s.subjects && Array.isArray(s.subjects)) {
                document.querySelectorAll('#subject-list input[type="checkbox"]').forEach(cb => {
                    cb.checked = s.subjects.includes(cb.value);
                });
            }
            
            if (s.numProblems) document.getElementById('num-problems').value = s.numProblems;
            if (s.columns) {
                document.getElementById('num-columns').value = s.columns;
                document.documentElement.style.setProperty('--grid-cols', s.columns);
            }
            document.getElementById('show-answers').checked = s.showAnswers || false;
            document.getElementById('show-solutions').checked = s.showSolutions || false;
            
            if (s.difficulty) {
                document.querySelectorAll('.segment').forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`.segment[data-diff="${s.difficulty}"]`);
                if (activeBtn) activeBtn.classList.add('active');
            }
        }
        App.generateNewData();
    }
    
    // ==========================================
    // 5. UI & STATE CONTROLLER
    // ==========================================
    const Engine = new WorksheetEngine(ProblemRegistry);
    
    const App = {
        init: () => {
            App.populateSubjects();
            //loadSettings(); // Uncomment when ready to use localStorage
            
            // If loadSettings is commented out, we still need to trigger the first generation
            // if(!localStorage.getItem('worksheetSettingsForCalculus')) {
            //     App.generateNewData();
            // }
        },
        
        populateSubjects: () => {
            const container = document.getElementById('subject-list');
            container.innerHTML = '';
            
            Object.keys(ProblemRegistry).forEach(key => {
                const row = document.createElement('div');
                row.className = 'row'; // Utilize your existing iOS row styling
                
                const displayName = key.charAt(0).toUpperCase() + key.slice(1);
                
                row.innerHTML = `
                    <label>${displayName}</label>
                    <label class="switch">
                        <input type="checkbox" value="${key}" checked onchange="App.generateNewData()">
                        <span class="slider"></span>
                    </label>
                `;
                container.appendChild(row);
            });
        },
        
        getSelectedSubjects: () => {
            const checked = document.querySelectorAll('#subject-list input:checked');
            return Array.from(checked).map(cb => cb.value);
        },
        
        toggleSettings: () => {
            document.getElementById('settings-panel').classList.toggle('hidden');
            triggerHaptic();
        },
        
        setDifficulty: (level) => {
            document.querySelectorAll('.segment').forEach(seg => seg.classList.remove('active'));
            document.getElementById('seg-' + level).classList.add('active');
            triggerHaptic();
            App.generateNewData();
        },
        
        updateColumns: () => {
            const cols = document.getElementById('num-columns').value || 1;
            document.documentElement.style.setProperty('--grid-cols', cols);
            saveSettingsForCalculus();
        },
        
        generateNewData: () => {
            const subjects = App.getSelectedSubjects();
            const difficulty = document.querySelector('.segment.active').dataset.diff;
            const numProblems = parseInt(document.getElementById('num-problems').value) || 10;
            
            if (subjects.length === 0) {
                document.getElementById('worksheet-grid').innerHTML = '<p style="text-align:center; padding: 20px; width:100%; color: var(--text-muted);">Please select at least one subject.</p>';
                return;
            }
            
            App.updateColumns();
            Engine.generateProblems(subjects, difficulty, numProblems);
            
            App.renderWorksheet();
            saveSettingsForCalculus();
        },
        
        renderWorksheet: () => {
            const grid = document.getElementById('worksheet-grid');
            const showAns = document.getElementById('show-answers').checked;
            const showSol = document.getElementById('show-solutions').checked;
            let html = '';
            
            Engine.currentData.forEach((item, index) => {
                // Ensure katex is available before rendering
                if (typeof katex !== 'undefined') {
                    let e = katex.renderToString(item.expr, { displayMode: true, throwOnError: false });
                    let a = showAns ? katex.renderToString(item.ans, { displayMode: true, throwOnError: false }) : '';
                    let s = showSol ? katex.renderToString(item.sol || '', { displayMode: true, throwOnError: false }) : '';
                    
                    html += `
                            <div class="math-problem">
                            <div class="prob-header">Problem ${index + 1}</div>
                            <div class="expression">${e}</div>
                            ${showAns ? `<div class="answer">${a}</div>` : ''}
                            ${showSol ? `<div class="solution"><div class="step">Solution:</div>${s}</div>` : ''}
                        </div>`;
                } else {
                    html += `<div class="math-problem"><p>KaTeX not loaded.</p></div>`;
                }
            });
            
            grid.innerHTML = html;
            triggerHaptic();
            saveSettingsForCalculus();
        }
    };
    
    // Initialize application on load
    window.addEventListener('DOMContentLoaded', App.init);
    
</script>
