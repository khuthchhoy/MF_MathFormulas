

<div class="sticky-bar">
  <button class="btn-settings" onclick="toggleSettings()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    Configure
  </button>
  <!-- <button class="btn-scramble" onclick="scrambleCurrent()">Scramble Order</button> -->
  <div class="action-stack">
    <button class="btn-generate" onclick="fullRefresh()">Generate</button>
  </div>
</div>

<div class="app-container">
  <div id="settings-panel" class="hidden">
    <h2 class="section-title">Difficulty Level</h2>
    <div class="card">
      <div class="segmented-control">
        <div id="seg-easy" class="segment" onclick="setDifficulty('easy')">Easy</div>
        <div id="seg-med" class="segment active" onclick="setDifficulty('med')">Medium</div>
        <div id="seg-hard" class="segment" onclick="setDifficulty('hard')">Hard</div>
      </div>
    </div>

    <h2 class="section-title">Worksheet Settings</h2>
    <div class="card">
      <div class="row">
        <label>Type</label>
        <select id="MathAction" onchange="updateState()">
          <option value="add">Addition</option>
          <option value="sub">Subtraction</option>
          <option value="mul">Multiplication</option>
          <option value="div">Division</option>
          <option value="mixed">Mixed</option>
        </select>
      </div>
      <div class="row">
        <label>Problems</label>
        <input type="number" id="NumProb" onchange="updateState()">
      </div>
      <div class="row">
        <label>Columns</label>
        <input type="number" id="ColPage" onchange="updateState()">
      </div>
      <div class="row">
        <label>Min Value</label>
        <input type="number" id="MinVal" onchange="updateState()">
      </div>
      <div class="row">
        <label>Max Value</label>
        <input type="number" id="MaxVal" onchange="updateState()">
      </div>
      <div class="row">
        <label>Top > Bottom</label>
        <label class="switch">
          <input type="checkbox" id="ReMax" onchange="updateState()">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <label>Show Answers</label>
        <label class="switch">
          <input type="checkbox" id="answers" onchange="renderWorksheet(); triggerHaptic();">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <h2 class="section-title">Worksheet Preview</h2>
  <div id="worksheet-grid"></div>
</div>

<script>
  let config = {
    numProb: 12,
    cols: 3,
    min: 10,
    max: 99,
    topBigger: true,
    action: 'add',
    data: [] 
  };

  // --- UI Logic ---
    function toggleSettings() {
      const panel = document.getElementById('settings-panel');
      panel.classList.toggle('hidden');
    }

  function save() {
    const toSave = {...config};
    delete toSave.data; 
    localStorage.setItem('mathAppConfig', JSON.stringify(toSave));
  }

  function load() {
    const saved = localStorage.getItem('mathAppConfig');
    if (saved) {
      Object.assign(config, JSON.parse(saved));
      document.getElementById("NumProb").value = config.numProb;
      document.getElementById("ColPage").value = config.cols;
      document.getElementById("MinVal").value = config.min;
      document.getElementById("MaxVal").value = config.max;
      document.getElementById("ReMax").checked = config.topBigger;
      document.getElementById("MathAction").value = config.action;
    }
    updateDifficultyUI();
  }

  function updateDifficultyUI() {
    document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
    if (config.min == 0 && config.max == 10) document.getElementById('seg-easy').classList.add('active');
    else if (config.min == 10 && config.max == 99) document.getElementById('seg-med').classList.add('active');
    else if (config.min == 100 && config.max == 999) document.getElementById('seg-hard').classList.add('active');
  }

  function updateState() {
    config.numProb = parseInt(document.getElementById("NumProb").value) || 12;
    config.cols = parseInt(document.getElementById("ColPage").value) || 3;
    config.min = parseInt(document.getElementById("MinVal").value) || 0;
    config.max = parseInt(document.getElementById("MaxVal").value) || 10;
    config.topBigger = document.getElementById("ReMax").checked;
    config.action = document.getElementById("MathAction").value;
    updateDifficultyUI();
    save();
    generateNewData();
  }

  function setDifficulty(level) {
    if (level === 'easy') { config.min = 0; config.max = 10; }
    if (level === 'med')  { config.min = 10; config.max = 99; }
    if (level === 'hard') { config.min = 100; config.max = 999; }
    document.getElementById("MinVal").value = config.min;
    document.getElementById("MaxVal").value = config.max;
    updateState();
  }

  function generateNewData() {
    config.data = [];
    const ops = ['add', 'sub', 'mul', 'div'];

    for (let i = 0; i < config.numProb; i++) {
      let activeOp = config.action === 'mixed' ? ops[Math.floor(Math.random() * 4)] : config.action;
      let x, y, ans;

      if (activeOp === 'div') {
        y = Math.floor(Math.random() * (config.max > 20 ? 11 : 5)) + 2; 
        ans = Math.floor(Math.random() * (config.max > 50 ? 12 : 6)) + 1;
        x = y * ans;
      } else {
        x = Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;
        y = config.topBigger 
            ? Math.floor(Math.random() * (x - config.min + 1)) + config.min 
            : Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;
        
        if (activeOp === 'add') ans = x + y;
        if (activeOp === 'sub') ans = x - y;
        if (activeOp === 'mul') ans = x * y;
      }
      config.data.push({ x, y, op: activeOp, ans });
    }
    renderWorksheet();
  }

  function renderWorksheet() {
    const showAns = document.getElementById('answers').checked;
    const symbols = { add: '+', sub: '-', mul: '×', div: '÷' };
    let html = '<table><tr>';

    config.data.forEach((item, index) => {
      html += `
        <td align="center">
          <div class="math-problem-table">
            <div>${item.x}</div>
            <div class="bottom-line">${symbols[item.op]} ${item.y}</div>
            <div class="answer-table">${showAns ? item.ans : '&nbsp;'}</div>
          </div>
        </td>`;
      if ((index + 1) % config.cols === 0 && (index + 1) < config.data.length) {
        html += '</tr><tr>';
      }
    });

    html += '</tr></table>';
    document.getElementById('worksheet-grid').innerHTML = html;
  }

  function fullRefresh() {
    triggerHaptic();
    generateNewData();
    // document.getElementById('worksheet-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function scrambleCurrent() {
    triggerHaptic();
    config.data.sort(() => Math.random() - 0.5);
    renderWorksheet();
    // document.getElementById('worksheet-grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  window.onload = () => {
    load();
    generateNewData();
  };
</script>
